
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  .app{font-family:'DM Sans',sans-serif;background:var(--color-background-tertiary);min-height:600px}
  .hdr{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:12px 16px;display:flex;align-items:center;gap:10px}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;color:var(--color-text-primary)}
  .logo span{color:#E24B4A}
  .live-pill{margin-left:auto;background:#E24B4A;color:#fff;font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;letter-spacing:.8px}

  .mode-bar{display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary)}
  .mode-btn{padding:11px 8px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;border:none;background:none;cursor:pointer;color:var(--color-text-secondary);border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
  .mode-btn.active{color:#E24B4A;border-bottom-color:#E24B4A}

  .body{padding:14px}

  .capture-zone{background:var(--color-background-primary);border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:28px 16px;text-align:center;cursor:pointer;position:relative;transition:border-color .2s}
  .capture-zone:hover,.capture-zone.drag-over{border-color:#E24B4A}
  .capture-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .cap-icon{font-size:32px;color:var(--color-text-secondary);display:block;margin-bottom:10px}
  .cap-title{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
  .cap-sub{font-size:12px;color:var(--color-text-secondary)}
  .cap-sub strong{color:#E24B4A;font-weight:500}

  .cam-btn{width:100%;margin-top:10px;padding:11px;background:#E24B4A;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .15s}
  .cam-btn:hover{opacity:.9}
  .cam-btn:disabled{opacity:.45;cursor:default}

  .prev-bar{display:flex;align-items:center;gap:10px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:10px 12px;margin-top:10px}
  .prev-thumb{width:44px;height:62px;border-radius:5px;object-fit:cover;border:0.5px solid var(--color-border-tertiary);flex-shrink:0}
  .prev-info{flex:1;min-width:0}
  .prev-name{font-size:12px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prev-sz{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
  .rm-btn{background:none;border:0.5px solid var(--color-border-tertiary);border-radius:6px;padding:5px 7px;cursor:pointer;color:var(--color-text-secondary);font-size:13px;flex-shrink:0}
  .rm-btn:hover{background:var(--color-background-danger);color:var(--color-text-danger)}

  .scan-btn{width:100%;margin-top:10px;padding:13px;background:#E24B4A;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s,transform .1s}
  .scan-btn:hover{opacity:.9}
  .scan-btn:active{transform:scale(.99)}
  .scan-btn:disabled{opacity:.4;cursor:default}

  .status-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-top:10px;display:flex;align-items:center;gap:12px}
  .spinner{width:18px;height:18px;flex-shrink:0;border:2px solid var(--color-border-tertiary);border-top-color:#E24B4A;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .status-text{font-size:13px;color:var(--color-text-secondary)}
  .status-text strong{color:var(--color-text-primary);font-weight:500}

  .results{margin-top:14px;display:flex;flex-direction:column;gap:10px}

  .id-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;display:flex;gap:12px;align-items:flex-start}
  .thumb-wrap{flex-shrink:0;position:relative}
  .thumb-lg{width:68px;height:95px;border-radius:6px;object-fit:cover;border:0.5px solid var(--color-border-tertiary)}
  .grade-dot{position:absolute;bottom:-6px;right:-6px;background:#E24B4A;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:14px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--color-background-primary)}
  .raw-dot{position:absolute;bottom:-6px;right:-6px;background:#888780;color:#fff;font-size:8px;font-weight:500;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--color-background-primary);letter-spacing:.3px}
  .card-meta{flex:1;min-width:0}
  .game-tag{display:inline-block;font-size:10px;font-weight:500;letter-spacing:.7px;text-transform:uppercase;padding:2px 7px;border-radius:20px;background:var(--color-background-info);color:var(--color-text-info);margin-bottom:5px}
  .raw-tag{display:inline-block;font-size:10px;font-weight:500;letter-spacing:.7px;text-transform:uppercase;padding:2px 7px;border-radius:20px;background:var(--color-background-secondary);color:var(--color-text-secondary);margin-bottom:5px}
  .card-name{font-size:17px;font-weight:500;color:var(--color-text-primary);line-height:1.3}
  .card-det{margin-top:5px;font-size:12px;color:var(--color-text-secondary);line-height:1.7}
  .cert-row{margin-top:8px;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--color-text-secondary);background:var(--color-background-secondary);border-radius:5px;padding:5px 9px}

  .price-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .p-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
  .p-lbl{font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .p-val{font-size:20px;font-weight:500;color:var(--color-text-primary);font-family:'Bebas Neue',sans-serif;letter-spacing:.5px}
  .p-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
  .trend-pill{display:inline-flex;align-items:center;gap:2px;font-size:10px;padding:2px 5px;border-radius:4px;margin-top:3px;font-weight:500}
  .t-up{background:var(--color-background-success);color:var(--color-text-success)}
  .t-down{background:var(--color-background-danger);color:var(--color-text-danger)}

  .section-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
  .sec-hdr{padding:12px 14px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:7px}
  .sec-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
  .sec-count{margin-left:auto;font-size:11px;color:var(--color-text-secondary)}
  .sale-row{padding:10px 14px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:8px}
  .sale-row:last-child{border-bottom:none}
  .sale-plat{font-size:11px;color:var(--color-text-secondary);width:44px;flex-shrink:0}
  .sale-grade-badge{background:#E24B4A;color:#fff;font-size:9px;font-weight:500;padding:1px 5px;border-radius:3px;flex-shrink:0}
  .sale-title-t{flex:1;font-size:12px;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sale-price-t{font-size:13px;font-weight:500;color:var(--color-text-primary);flex-shrink:0}
  .sale-date-t{font-size:10px;color:var(--color-text-secondary);flex-shrink:0;width:44px;text-align:right}

  .grade-predict{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
  .gp-hdr{padding:12px 14px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:7px}
  .gp-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
  .company-grades{display:flex;flex-direction:column;gap:0}
  .cg-row{padding:12px 14px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:10px}
  .cg-row:last-child{border-bottom:none}
  .cg-logo{font-size:11px;font-weight:500;color:var(--color-text-secondary);width:32px;flex-shrink:0}
  .cg-grade-big{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#E24B4A;flex-shrink:0;width:42px;line-height:1}
  .cg-bar-wrap{flex:1;min-width:0}
  .cg-bar-bg{height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden;margin-bottom:4px}
  .cg-bar-fill{height:100%;background:#E24B4A;border-radius:3px;transition:width .4s}
  .cg-grade-lbl{font-size:11px;color:var(--color-text-secondary)}
  .cg-conf{font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;flex-shrink:0}
  .conf-high{background:var(--color-background-success);color:var(--color-text-success)}
  .conf-med{background:var(--color-background-warning);color:var(--color-text-warning)}
  .conf-low{background:var(--color-background-danger);color:var(--color-text-danger)}

  .condition-details{padding:12px 14px;border-top:0.5px solid var(--color-border-tertiary)}
  .cond-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
  .cond-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
  .cond-item{background:var(--color-background-secondary);border-radius:6px;padding:8px 10px}
  .cond-item-lbl{font-size:10px;color:var(--color-text-secondary);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
  .cond-item-val{font-size:12px;font-weight:500;color:var(--color-text-primary)}
  .cond-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:1px}
  .dot-good{background:#639922}
  .dot-ok{background:#BA7517}
  .dot-bad{background:#E24B4A}

  .analysis-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-left:3px solid #E24B4A;border-radius:var(--border-radius-lg);padding:12px 14px}
  .an-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  .an-text{font-size:13px;color:var(--color-text-primary);line-height:1.65}

  .links-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px}
  .links-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px;display:flex;align-items:center;gap:5px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{display:inline-flex;align-items:center;gap:5px;border:0.5px solid var(--color-border-secondary);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--color-text-primary);text-decoration:none;cursor:pointer;background:var(--color-background-secondary);font-family:'DM Sans',sans-serif;transition:background .15s}
  .chip:hover{background:var(--color-background-primary);border-color:var(--color-border-primary)}

  .err-box{background:var(--color-background-danger);border:0.5px solid var(--color-border-danger);border-radius:var(--border-radius-lg);padding:12px 14px;display:flex;align-items:flex-start;gap:9px;margin-top:10px}
  .err-text{font-size:13px;color:var(--color-text-danger);line-height:1.5}

  .new-btn{width:100%;margin-top:10px;padding:11px;background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;font-weight:500;color:var(--color-text-primary);font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s}
  .new-btn:hover{background:var(--color-background-secondary)}

  .hidden{display:none!important}
  .video-wrap{position:relative;border-radius:var(--border-radius-lg);overflow:hidden;background:#000;margin-top:10px}
  video{width:100%;display:block;border-radius:var(--border-radius-lg)}
  .capture-overlay{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px}
  .shutter-btn{width:58px;height:58px;border-radius:50%;background:#fff;border:4px solid #E24B4A;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;color:#E24B4A}
  .close-cam-btn{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.5);border:none;color:#fff;border-radius:50%;width:32px;height:32px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  canvas#snap{display:none}
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Card scanner app: scan graded or raw trading cards for live pricing and PSA/BGS/CGC grade predictions</h2>

<div class="app">
  <div class="hdr">
    <span class="logo">CARD<span>GRADE</span></span>
    <span style="font-size:11px;color:var(--color-text-secondary)">PSA · BGS · CGC</span>
    <span class="live-pill">Live Pricing</span>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active" id="mode-graded" onclick="setMode('graded')">
      <i class="ti ti-shield-check" style="font-size:13px;margin-right:4px" aria-hidden="true"></i>Graded card
    </button>
    <button class="mode-btn" id="mode-raw" onclick="setMode('raw')">
      <i class="ti ti-cards" style="font-size:13px;margin-right:4px" aria-hidden="true"></i>Raw card
    </button>
  </div>

  <div class="body">
    <div id="upload-section">
      <div class="capture-zone" id="drop-zone">
        <input type="file" id="file-input" accept="image/*" />
        <i class="ti ti-camera cap-icon" aria-hidden="true"></i>
        <div class="cap-title" id="cap-title">Scan your graded card</div>
        <div class="cap-sub">Drop a photo or tap to browse<br><strong>PSA · BGS · CGC</strong> supported</div>
      </div>

      <button class="cam-btn" id="open-cam-btn">
        <i class="ti ti-camera" aria-hidden="true"></i>
        Use camera
      </button>

      <div id="cam-section" class="hidden">
        <div class="video-wrap">
          <video id="cam-video" autoplay playsinline muted></video>
          <div class="capture-overlay">
            <button class="shutter-btn" id="shutter-btn" aria-label="Take photo">
              <i class="ti ti-camera" aria-hidden="true"></i>
            </button>
          </div>
          <button class="close-cam-btn" id="close-cam-btn" aria-label="Close camera">
            <i class="ti ti-x" aria-hidden="true"></i>
          </button>
        </div>
        <canvas id="snap"></canvas>
      </div>

      <div class="prev-bar hidden" id="prev-bar">
        <img id="prev-thumb" class="prev-thumb" src="" alt="Card preview" />
        <div class="prev-info">
          <div class="prev-name" id="prev-name">card.jpg</div>
          <div class="prev-sz" id="prev-sz">0 KB</div>
        </div>
        <button class="rm-btn" id="rm-btn" aria-label="Remove image">
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
      </div>

      <button class="scan-btn" id="scan-btn" disabled>
        <i class="ti ti-zoom-scan" aria-hidden="true"></i>
        <span id="scan-label">Scan &amp; Get Pricing</span>
      </button>
    </div>

    <div id="status-section" class="hidden">
      <div class="status-box">
        <div class="spinner"></div>
        <div class="status-text" id="status-text">Analyzing card...</div>
      </div>
    </div>

    <div id="error-section" class="hidden">
      <div class="err-box">
        <i class="ti ti-alert-circle" style="font-size:17px;color:var(--color-text-danger);flex-shrink:0;margin-top:1px" aria-hidden="true"></i>
        <span class="err-text" id="err-text">Something went wrong. Please try again.</span>
      </div>
      <button class="new-btn" id="retry-btn">
        <i class="ti ti-refresh" aria-hidden="true"></i> Try again
      </button>
    </div>

    <div id="results-section" class="results hidden"></div>
  </div>
</div>

<script>
let mode = 'graded';
let imageBase64 = null;
let mediaStream = null;

const fileInput = document.getElementById('file-input');
const dropZone = document.getElementById('drop-zone');
const prevBar = document.getElementById('prev-bar');
const prevThumb = document.getElementById('prev-thumb');
const prevName = document.getElementById('prev-name');
const prevSz = document.getElementById('prev-sz');
const rmBtn = document.getElementById('rm-btn');
const scanBtn = document.getElementById('scan-btn');
const scanLabel = document.getElementById('scan-label');
const uploadSection = document.getElementById('upload-section');
const statusSection = document.getElementById('status-section');
const statusText = document.getElementById('status-text');
const errorSection = document.getElementById('error-section');
const errText = document.getElementById('err-text');
const resultsSection = document.getElementById('results-section');
const openCamBtn = document.getElementById('open-cam-btn');
const camSection = document.getElementById('cam-section');
const camVideo = document.getElementById('cam-video');
const shutterBtn = document.getElementById('shutter-btn');
const closeCamBtn = document.getElementById('close-cam-btn');
const snapCanvas = document.getElementById('snap');
const capTitle = document.getElementById('cap-title');

function setMode(m) {
  mode = m;
  document.getElementById('mode-graded').classList.toggle('active', m === 'graded');
  document.getElementById('mode-raw').classList.toggle('active', m === 'raw');
  capTitle.textContent = m === 'graded' ? 'Scan your graded card' : 'Scan your raw card';
  scanLabel.textContent = m === 'graded' ? 'Scan & Get Pricing' : 'Scan, Grade & Price';
  resetToUpload();
}

function fmtBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function setImageData(dataUrl, name, size) {
  imageBase64 = dataUrl.split(',')[1];
  prevThumb.src = dataUrl;
  prevName.textContent = name || 'photo.jpg';
  prevSz.textContent = size ? fmtBytes(size) : '';
  prevBar.classList.remove('hidden');
  scanBtn.disabled = false;
}

fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => setImageData(ev.target.result, f.name, f.size);
  r.readAsDataURL(f);
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => setImageData(ev.target.result, f.name, f.size);
  r.readAsDataURL(f);
});

rmBtn.addEventListener('click', () => {
  imageBase64 = null;
  fileInput.value = '';
  prevBar.classList.add('hidden');
  scanBtn.disabled = true;
});

openCamBtn.addEventListener('click', async () => {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    camVideo.srcObject = mediaStream;
    camSection.classList.remove('hidden');
    openCamBtn.classList.add('hidden');
    dropZone.classList.add('hidden');
  } catch (err) {
    errText.textContent = 'Camera access denied. Please allow camera access or use the file picker above.';
    errorSection.classList.remove('hidden');
  }
});

function stopCamera() {
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  camSection.classList.add('hidden');
  openCamBtn.classList.remove('hidden');
  dropZone.classList.remove('hidden');
}

closeCamBtn.addEventListener('click', stopCamera);

shutterBtn.addEventListener('click', () => {
  const w = camVideo.videoWidth || 640;
  const h = camVideo.videoHeight || 480;
  snapCanvas.width = w;
  snapCanvas.height = h;
  const ctx = snapCanvas.getContext('2d');
  ctx.drawImage(camVideo, 0, 0, w, h);
  const dataUrl = snapCanvas.toDataURL('image/jpeg', 0.92);
  stopCamera();
  setImageData(dataUrl, 'camera-photo.jpg', 0);
});

document.getElementById('retry-btn').addEventListener('click', resetToUpload);

function resetToUpload() {
  errorSection.classList.add('hidden');
  resultsSection.classList.add('hidden');
  statusSection.classList.add('hidden');
  uploadSection.classList.remove('hidden');
  resultsSection.innerHTML = '';
}

function setStatus(msg) { statusText.innerHTML = msg; }

function showErr(msg) {
  statusSection.classList.add('hidden');
  errText.textContent = msg;
  errorSection.classList.remove('hidden');
}

function fmt(v) {
  if (v == null || isNaN(+v)) return 'N/A';
  return '$' + parseFloat(v).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function gradeBarPct(g) {
  const n = parseFloat(g);
  if (isNaN(n)) return 0;
  return Math.round((n / 10) * 100);
}

function gradeLabel(g) {
  const n = parseFloat(g);
  if (n >= 9.5) return 'Gem Mint';
  if (n >= 9) return 'Mint';
  if (n >= 8) return 'Near Mint–Mint';
  if (n >= 7) return 'Near Mint';
  if (n >= 6) return 'Excellent–Mint';
  if (n >= 5) return 'Excellent';
  if (n >= 4) return 'Very Good–Excellent';
  if (n >= 3) return 'Very Good';
  if (n >= 2) return 'Good';
  return 'Poor';
}

function dotClass(rating) {
  if (!rating) return '';
  const r = rating.toLowerCase();
  if (r === 'excellent' || r === 'good' || r === 'clean' || r === 'sharp' || r === 'centered') return 'dot-good';
  if (r === 'minor wear' || r === 'slight' || r === 'moderate' || r === 'off-center') return 'dot-ok';
  return 'dot-bad';
}

scanBtn.addEventListener('click', async () => {
  if (!imageBase64) return;
  uploadSection.classList.add('hidden');
  errorSection.classList.add('hidden');
  resultsSection.classList.add('hidden');
  resultsSection.innerHTML = '';
  statusSection.classList.remove('hidden');

  try {
    if (mode === 'graded') {
      await runGradedFlow();
    } else {
      await runRawFlow();
    }
  } catch (e) {
    showErr(e.message || 'An unexpected error occurred.');
  }
});

async function callClaude(messages, tools) {
  const body = { model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages };
  if (tools) body.tools = tools;
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await resp.json();
  return data.content.map(b => b.text || '').join('');
}

function parseJSON(text) {
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

async function runGradedFlow() {
  setStatus('<strong>Step 1/3</strong> — Reading grading label and card details...');
  const identText = await callClaude([{
    role: 'user',
    content: [
      { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageBase64 } },
      { type: 'text', text: `Analyze this graded trading card. Respond ONLY with JSON, no markdown:
{"cardName":"full name","setName":"set or expansion","cardNumber":"# if visible or null","year":"year or null","game":"Pokemon|One Piece|Magic: The Gathering|Yu-Gi-Oh|Sports|Other","gradingCompany":"PSA|BGS|CGC|Other","grade":"numeric e.g. 10","certNumber":"cert # if visible or null","variety":"e.g. Holo 1st Edition or null","fullSearchQuery":"optimized eBay search e.g. PSA 10 Charizard Base Set Holo"}` }
    ]
  }]);
  let card;
  try { card = parseJSON(identText); } catch { throw new Error('Could not read card details. Please ensure the image is clear and shows the grading label.'); }
  if (!card.cardName || card.cardName === 'Unknown') throw new Error('Could not identify the card. Please try a clearer image.');

  setStatus('<strong>Step 2/3</strong> — Searching live sales for ' + card.cardName + ' ' + card.gradingCompany + ' ' + card.grade + '...');
  const priceText = await callClaude([{
    role: 'user',
    content: `Search for latest sold prices for: ${card.fullSearchQuery}\nGame: ${card.game}, Grading: ${card.gradingCompany} ${card.grade}, Set: ${card.setName || ''}\n\nRespond ONLY with JSON:\n{"marketValue":number,"lowPrice":number,"highPrice":number,"trend":"up|down|stable","trendPercent":number,"recentSales":[{"price":number,"date":"Mon YYYY","platform":"eBay|PWCC|Other","title":"short title"}],"totalSalesFound":number,"marketAnalysis":"2-3 sentences","confidence":"high|medium|low"}`
  }], [{ type: 'web_search_20250305', name: 'web_search' }]);

  let pricing;
  try { pricing = parseJSON(priceText); } catch { pricing = { marketValue: null, lowPrice: null, highPrice: null, trend: 'stable', trendPercent: 0, recentSales: [], totalSalesFound: 0, marketAnalysis: 'Live pricing searched. Check eBay completed sales for current data.', confidence: 'low' }; }

  setStatus('<strong>Step 3/3</strong> — Building report...');
  await new Promise(r => setTimeout(r, 300));
  statusSection.classList.add('hidden');
  renderGradedResults(card, pricing);
}
